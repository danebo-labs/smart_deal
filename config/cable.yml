# Use solid_cable in dev so broadcasts from the worker process (Solid Queue) reach
# subscribers in the web process (puma). The :async adapter is in-process only and
# silently drops cross-process broadcasts (e.g., BedrockIngestionJob → kb_sync UI feedback).
development:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.hour

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
