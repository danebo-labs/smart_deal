default: &default
  adapter: postgresql
  encoding: unicode
  # AR pool must be ≥ Puma threads + a small buffer for ActionCable + Solid Queue
  # connection housekeeping. Without the buffer, Puma threads occasionally block
  # waiting for a free connection during peak (upload + RAG ask + metrics broadcast).
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 }.to_i + 2 %>
  host:     <%= ENV.fetch("DB_HOST",     "localhost") %>
  username: <%= ENV.fetch("DB_USERNAME", "app_user") %>
  password: <%= ENV.fetch("DB_PASSWORD", "karateca") %>
  gssencmode: disable
  sslmode: <%= ENV.fetch("DB_SSLMODE", Rails.env.production? ? "require" : "disable") %>

development:
  primary: &development_primary
    <<: *default
    database: smart_deal_development
  cache:
    <<: *development_primary
    database: smart_deal_development_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *development_primary
    database: smart_deal_development_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *development_primary
    database: smart_deal_development_cable
    migrations_paths: db/cable_migrate

test:
  primary: &test_primary
    <<: *default
    database: smart_deal_test
  cache:
    <<: *test_primary
    database: smart_deal_test_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *test_primary
    database: smart_deal_test_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *test_primary
    database: smart_deal_test_cable
    migrations_paths: db/cable_migrate

production:
  primary: &production_primary
    <<: *default
    database: <%= ENV.fetch("DB_NAME",     "smart_deal_production") %>
    host:     <%= ENV.fetch("DB_HOST",     "localhost") %>
    username: <%= ENV.fetch("DB_USERNAME", "app_user") %>
    password: <%= ENV.fetch("DB_PASSWORD", "") %>
  cache:
    <<: *production_primary
    database: <%= ENV.fetch("DB_CACHE_NAME", "smart_deal_production_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *production_primary
    database: <%= ENV.fetch("DB_QUEUE_NAME", "smart_deal_production_queue") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *production_primary
    database: <%= ENV.fetch("DB_CABLE_NAME", "smart_deal_production_cable") %>
    migrations_paths: db/cable_migrate

# Client business database (Text-to-SQL queries).
# This is a separate PostgreSQL database containing the client's operational data.
# The connection is isolated via the ClientDatabase abstract model.
# Future multi-tenant: this will be replaced with per-tenant configuration.
client_db:
<% if ENV['RAILS_ENV'] == 'test' %>
  adapter: sqlite3
  database: storage/client_test.sqlite3
  pool: 5
  timeout: 5000
<% else %>
  adapter: postgresql
  host: localhost
  port: 5432
  database: app_db
  username: app_user
  password: karateca
  gssencmode: disable
<% end %>
