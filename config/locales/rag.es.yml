# RAG / chat messages
es:
  rag:
    document_indexing_message: "Tu documento está siendo procesado. Estará listo para consultas en breve. Puedes seguir haciendo consultas sobre los documentos ya indexados."
    image_indexing_message: "Tu imagen está siendo indexada en la Base de Conocimiento. Tu consulta se enviará automáticamente cuando la indexación finalice."
